name: Andon board

on:
  schedule:
    - cron: "0 10 * * *"   # daily, 6 AM ET during DST, 5 AM EST
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

concurrency:
  group: andon

jobs:
  rebuild-and-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild board
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_board.py

      - name: Commit board
        run: |
          git config user.name "andon-bot"
          git config user.email "actions@github.com"
          git add profile/README.md profile/board.svg
          git diff --cached --quiet || git commit -m "Rebuild andon board"
          git pull --rebase origin main
          git push

      - name: Mirror to personal profile
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git clone "https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/bennetthanke/bennetthanke.git" mirror
          cp profile/README.md mirror/README.md
          cd mirror
          git config user.name "andon-bot"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Mirror landing page from bhanke-lab/.github"
          git push

      - name: Raise andon on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open=$(gh issue list --state open --search "Andon board rebuild failed in:title" --json number --jq length)
          if [ "$open" = "0" ]; then
            gh issue create --title "Andon board rebuild failed" --body "The board pipeline failed. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
